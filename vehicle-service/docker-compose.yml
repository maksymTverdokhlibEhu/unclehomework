version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb-vehicle-service
    ports:
      - "27019:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb-vehicle-service_data:/data/db
    networks:
      - backend

volumes:
  mongodb-vehicle-service_data:  

networks:
  backend:
    driver: bridge